# Dependabot for the first-party app bundles. The apps declare their heavy deps
# in each app.json's pythonDependencies (installed by the platform at app-install),
# so there is no repo-level Python lockfile to track here — Dependabot watches the
# GitHub Actions the CI workflow pins (CI-RELEASE-ENGINEERING S4).
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]
