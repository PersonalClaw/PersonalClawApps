# CI — first-party app bundles. Verifies every app against the platform contract
# WITHOUT installing vendor SDKs (the apps stub them; a test needing a real SDK
# fails loudly here, which is correct). Jobs per CI-RELEASE-ENGINEERING §"apps repo":
# manifest-validate · tests · boundary · dco (PR-only).
name: CI

on:
  pull_request:
  push:
    branches-ignore: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Core is installed from main until PyPI has a release (DISTRIBUTION S2);
  # switch to a pinned "personalclaw==<version>" then. (dated 2026-07-20)
  CORE_SPEC: "personalclaw @ git+https://github.com/PersonalClaw/PersonalClaw@main"

jobs:
  manifest-validate:
    # Every app.json parses against core's own manifest parser (the real contract),
    # not a hand-rolled schema — so a manifest that core would reject fails CI.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Install core (for personalclaw.apps.manifest)
        # Install into a uv-managed venv, not `--system`: the runner's /usr is
        # PEP-668 externally-managed and uv refuses `--system` there. Export the venv
        # on PATH/env so later steps' `python` and `uv pip` resolve to it.
        run: |
          uv venv --python 3.12 .venv
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"
          echo "VIRTUAL_ENV=$PWD/.venv" >> "$GITHUB_ENV"
          uv pip install --python "$PWD/.venv/bin/python" "$CORE_SPEC"
      - name: Validate every app.json
        run: |
          python - <<'PY'
          import json, pathlib, sys
          from personalclaw.apps.manifest import AppManifest
          bad = []
          for mf in sorted(pathlib.Path(".").glob("*/app.json")):
              try:
                  m = AppManifest.from_dict(json.loads(mf.read_text()))
                  # round-trip must be stable (the parity contract apps rely on)
                  assert AppManifest.from_dict(m.to_dict()).to_dict() == m.to_dict()
              except Exception as e:  # noqa: BLE001
                  bad.append(f"{mf}: {type(e).__name__}: {e}")
          if bad:
              print("\n".join(bad)); sys.exit(1)
          print(f"OK: {len(list(pathlib.Path('.').glob('*/app.json')))} manifests valid")
          PY

  tests:
    # Each bundle's test_*.py, with core installed but NO vendor SDKs — the apps
    # stub them into sys.modules; a test that imports a real vendor SDK fails here.
    runs-on: ubuntu-latest
    # No PERSONALCLAW_HOME: the app tests resolve state via Path.home() directly
    # (not config_dir()), and setting a global home would defeat the Path.home()/HOME
    # patches these tests rely on — the same mismatch documented in the core test job.
    env:
      PERSONALCLAW_SKIP_APP_BACKENDS: "1"
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Install core + pytest
        # uv-managed venv (not `--system`: the runner's /usr is PEP-668
        # externally-managed). Exporting VIRTUAL_ENV makes later `uv pip install`
        # and `python` in this job resolve to the venv automatically.
        run: |
          uv venv --python 3.12 .venv
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"
          echo "VIRTUAL_ENV=$PWD/.venv" >> "$GITHUB_ENV"
          uv pip install --python "$PWD/.venv/bin/python" "$CORE_SPEC" pytest pytest-asyncio
      - name: Run each bundle's tests (per-bundle)
        # Per-bundle so duplicate test_*.py basenames across apps don't collide in
        # one pytest run. Before running a bundle, install its manifest-declared
        # pythonDependencies (what the platform installs at real app-install time) —
        # a channel app like slack-channel genuinely needs its SDK (slack-sdk) to
        # import, unlike the model apps that stub theirs. Model-provider apps that
        # DON'T declare deps still run with their vendor SDK stubbed (the contract).
        run: |
          rc=0
          for d in */; do
            d=${d%/}
            [ -d "$d" ] || [ "$d" = docs ] && continue
            # any test file, incl. a tests/ subdir (slack-channel) or test_catalog.py
            if compgen -G "$d/test_*.py" >/dev/null || compgen -G "$d/tests/test_*.py" >/dev/null; then
              echo "::group::$d"
              # install this bundle's declared pythonDependencies, if any (into the
              # venv — VIRTUAL_ENV is exported, so uv pip targets it without --system)
              deps=$(python -c "import json,sys; d=json.load(open('$d/app.json')); print(' '.join((d.get('dependencies') or {}).get('pythonDependencies') or []))" 2>/dev/null || true)
              [ -n "$deps" ] && uv pip install $deps
              python -m pytest "$d" -q || rc=1
              echo "::endgroup::"
            fi
          done
          exit $rc

  boundary:
    # SDK-only import lint from the apps side: an installed app may import core ONLY
    # via personalclaw.sdk.* — never deep internals. Mirrors core's
    # tests/test_apps_import_boundary.py, run against this checkout.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # Pure-stdlib ast lint — no uv, no core install needed. (An earlier
      # `uv python install` step was dead cruft: uv isn't set up in this job.)
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - name: Lint app imports (personalclaw.sdk.* only)
        run: |
          python - <<'PY'
          import ast, pathlib, sys
          violations = {}
          for f in sorted(pathlib.Path(".").rglob("*/*.py")):
              if "__pycache__" in f.parts or f.name.startswith("test_"):
                  continue
              tree = ast.parse(f.read_text(encoding="utf-8"), filename=str(f))
              bad = []
              def check(mod):
                  if mod and mod.startswith("personalclaw"):
                      parts = mod.split(".")
                      if not (len(parts) >= 2 and parts[1] == "sdk"):
                          bad.append(mod)
              for node in ast.walk(tree):
                  if isinstance(node, ast.Import):
                      for a in node.names:
                          check(a.name)
                  elif isinstance(node, ast.ImportFrom) and node.level == 0:
                      check(node.module)
              if bad:
                  violations[str(f)] = sorted(set(bad))
          if violations:
              for f, mods in sorted(violations.items()):
                  print(f"  {f}: {mods}")
              print("\nApps must import core only via personalclaw.sdk.* — promote the "
                    "needed symbol to an sdk submodule instead of reaching around it.")
              sys.exit(1)
          print("OK: all app imports go through personalclaw.sdk.*")
          PY

  dco:
    # Every commit in a PR must carry a Signed-off-by trailer (DCO — plan 37),
    # same provenance rule as core. Pure-git check, PR-only.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Verify DCO sign-off on every commit
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          missing=0
          for sha in $(git rev-list "$BASE_SHA".."$HEAD_SHA"); do
            author="$(git show -s --format='%an <%ae>' "$sha")"
            if ! git show -s --format='%(trailers:key=Signed-off-by,valueonly)' "$sha" | grep -qF "$author"; then
              echo "::error::commit $sha is missing a matching 'Signed-off-by: $author' trailer — run: git commit -s (or git rebase --signoff)"
              missing=1
            fi
          done
          [ "$missing" -eq 0 ] && echo "DCO: all commits signed off."
          exit "$missing"
