# Slack App Manifest for PersonalClaw
# Import via https://api.slack.com/apps → Create New App → From a manifest
#
# After import you still need to:
#   1. Socket Mode: toggle OFF then back ON to trigger token generation dialog
#      → add scope connections:write → Generate → copy the xapp-... token
#   2. Install the app to your workspace and copy the Bot Token (xoxb-...)
#   3. Run `personalclaw setup` and paste both tokens
#
# See README.md (Slack app setup) for the full walkthrough.

display_information:
  name: PersonalClaw-{{USERNAME}}
  description: AI agent management layer with persistent memory, scheduled jobs, and multi-session orchestration
  background_color: "#1a1a2e"

features:
  app_home:
    home_tab_enabled: true
    messages_tab_enabled: true
    messages_tab_read_only_enabled: false
  bot_user:
    display_name: PersonalClaw-{{USERNAME}}
    always_online: true
  slash_commands:
    - command: /personalclaw
      description: Dashboard access, allowlist, and channel tracking
      usage_hint: "dashboard [duration] | @user | #channel"
      should_escape: true

oauth_config:
  scopes:
    bot:
      - app_mentions:read
      - channels:history
      - channels:read
      - chat:write
      - commands
      - files:read
      - files:write
      - groups:read
      - im:history
      - im:read
      - im:write
      - reactions:write

settings:
  event_subscriptions:
    bot_events:
      - message.im
      - message.channels
      - app_mention
      - app_home_opened
      - file_change
      - member_joined_channel
  interactivity:
    is_enabled: true
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
